# Separate checkpoint: FEM stress maps (blue←white→red).
# Keep architecture aligned with fem_displacement_map for shared Rhino inference code.

experiment_name: fem_stress_map
model_family: fem_field
field: stress

data:
  input_images_dir: data/processed/fem_maps/inputs
  target_images_dir: data/processed/fem_maps/stress_maps
  image_size: [512, 512]

training:
  seed: 42
  batch_size: 4
  num_epochs: 100
  learning_rate: 1.0e-4
  checkpoint_dir: outputs/checkpoints/fem_stress_map

diffusion:
  num_train_timesteps: 1000
  conditioning: image
