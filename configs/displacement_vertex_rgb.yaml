# DDPM on trig displacement JPEGs (R,G,B = x,y,z encoding) + optional FEM steering loss.
# Generate data: node scripts/generate-trig-surfaces.js --max N
# Train: python -m iass_fem_diff.cli train-vertex-rgb configs/displacement_vertex_rgb.yaml

experiment_name: displacement_vertex_rgb
model_family: vertex_displacement_rgb

data:
  processed_dir: data/processed/displacement_rgb/trig
  image_size: [80, 80]
  # fixed_linear: byte 0..255 ↔ physical [-15,15] per axis (see generate-trig-surfaces.js); extent=15 for FEM
  # extent_from_meta: legacy zero-mid JPEGs + per-channel extent_R in sidecar
  normalization: fixed_linear
  # If true, expects `.meta.json` to include extra.fem_stress_grid (von Mises) and appends it as channel 4.
  include_fem_stress: true
  fem_stress_norm: 0.0

training:
  seed: 42
  batch_size: 4
  num_epochs: 100
  learning_rate: 1.0e-4
  checkpoint_dir: outputs/checkpoints/displacement_vertex_rgb_1lossweight
  # auto: use CUDA if torch.cuda.is_available(); cuda: require GPU or fail; cpu: force CPU
  device: cuda

diffusion:
  num_train_timesteps: 1000

# Differentiable proxy (viewer-consistent): pinned four edges (u and v), Coons sag w*,
# Laplacian bending. Loss on predicted x0 steers toward lower curvature by default.
# Set maximize_laplacian_proxy: true (or CLI --fem-ridge) to subtract the proxy from the loss
# so optimization increases mean squared Laplacian (ridge-seeking on this proxy only).
fem:
  loss_weight: 1.0
  maximize_laplacian_proxy: false
  plane_size: 2.0
  curvature_span: 1
  vertical_channel: 2
